name: Publish Python SDK to PyPI

on:
  push:
    tags:
      - 'v*' # Automatically trigger on new tags like v0.3.0
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  build-wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: all
          args: --release --out dist
          sdist: ${{ matrix.os == 'ubuntu-latest' }} # Only build sdist once on Linux
          working-directory: crates/tokenslim-py

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: crates/tokenslim-py/dist

  publish:
    name: Publish to PyPI
    needs: [build-wheels]
    runs-on: ubuntu-latest
    
    # Required for PyPI Trusted Publishing (OIDC)
    permissions:
      id-token: write
      contents: read
      
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: wheels-*
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist

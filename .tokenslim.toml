# TokenSlim Configuration
# Generated by `tokenslim init`
# Project type: rust
# Framework: 
# Package Manager: 

[general]
# 项目类型 (自动检测)
project_type = "rust"
# 框架 (如果检测到)
framework = ""
# 包管理器 (如果检测到)
package_manager = ""

[compression]
# 启用全局日志重排 (解决 make -jN 等并发构建的乱序问题)
reorder = true
# AI 导出模式 (生成面向大模型的降噪报告)
ai_export = false
# 预设配置: fast (速度优先), balanced (均衡), ai (AI 信号优先)
preset = "balanced"

[encoding]
# 强制 UTF-8 输出 (避免 Windows 下的编码问题)
force_utf8 = true

[token_optimizer]
# 全局 token 优化开关（字典经济模型）
enabled = true

[token_optimizer.scopes.paths]
# footer token 至少出现 N 次才写入 paths: 字典
min_footer_token_uses = 2
# 是否允许生成嵌套路径字典（如 $P7=$P3/subdir）
enable_nested_aliases = true

[token_optimizer.presets.fast.paths]
min_footer_token_uses = 2
enable_nested_aliases = false

[token_optimizer.presets.balanced.paths]
min_footer_token_uses = 2
enable_nested_aliases = true

[token_optimizer.presets.ai.paths]
min_footer_token_uses = 2
enable_nested_aliases = true
